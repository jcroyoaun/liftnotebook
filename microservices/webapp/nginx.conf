server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to workouttracker
    location /v1/ {
        proxy_pass http://workouttracker:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Service worker must never be CDN/browser-cached long: a stale sw.js
    # pins every installed PWA to an old build (learned the hard way).
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # Hashed filenames only — safe to cache forever.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Icons keep stable names; short TTL so a redesign propagates.
    location ~* ^/(favicon\.svg|icons\.svg|apple-touch-icon\.png|pwa-[^/]+\.png)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # SPA fallback; index.html revalidates every load so deploys land.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

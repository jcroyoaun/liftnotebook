name: Service CI and GHCR Publish

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-and-push.yml"
      - "microservices/**"
      - "scripts/update-image-references.sh"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-and-push.yml"
      - "microservices/**"
      - "scripts/update-image-references.sh"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - exerciselib
          - libconsole
          - workouttracker
          - webapp
      tag:
        description: "Optional image tag override"
        required: false
        type: string

concurrency:
  group: service-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_REGISTRY: ghcr.io
  GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE || github.repository_owner }}
  DOCKER_METADATA_SHORT_SHA_LENGTH: 12

jobs:
  go-unit-tests:
    name: Go Unit Tests (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: exerciselib
            working_directory: microservices/exerciselib
            go_version_file: microservices/exerciselib/go.mod
            cache_dependency_path: microservices/exerciselib/go.sum
          - name: workouttracker
            working_directory: microservices/workouttracker
            go_version_file: microservices/workouttracker/go.mod
            cache_dependency_path: microservices/workouttracker/go.sum
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.service.go_version_file }}
          cache-dependency-path: ${{ matrix.service.cache_dependency_path }}

      - name: Run unit tests
        working-directory: ${{ matrix.service.working_directory }}
        run: go test ./...

  webapp-unit-tests:
    name: Webapp Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: microservices/webapp/package-lock.json

      - name: Install dependencies
        working-directory: microservices/webapp
        run: npm ci

      - name: Run unit tests
        working-directory: microservices/webapp
        run: npm run test:unit

  prepare-publish-matrix:
    name: Select Publish Targets
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build publish matrix
        id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          SELECTED_SERVICE: ${{ github.event.inputs.service }}
        run: |
          full_matrix='[{"id":"exerciselib","image_name":"exerciselib","context":"microservices/exerciselib","dockerfile":"microservices/exerciselib/Dockerfile"},{"id":"libconsole","image_name":"libconsole","context":"microservices/frontend","dockerfile":"microservices/frontend/Dockerfile"},{"id":"workouttracker","image_name":"workouttracker","context":"microservices/workouttracker","dockerfile":"microservices/workouttracker/Dockerfile"},{"id":"webapp","image_name":"liftnotebook-webapp","context":"microservices/webapp","dockerfile":"microservices/webapp/Dockerfile"}]'

          case "${EVENT_NAME}:${SELECTED_SERVICE:-all}" in
            push:*|workflow_dispatch:all|workflow_dispatch:)
              matrix="${full_matrix}"
              ;;
            workflow_dispatch:exerciselib)
              matrix='[{"id":"exerciselib","image_name":"exerciselib","context":"microservices/exerciselib","dockerfile":"microservices/exerciselib/Dockerfile"}]'
              ;;
            workflow_dispatch:libconsole)
              matrix='[{"id":"libconsole","image_name":"libconsole","context":"microservices/frontend","dockerfile":"microservices/frontend/Dockerfile"}]'
              ;;
            workflow_dispatch:workouttracker)
              matrix='[{"id":"workouttracker","image_name":"workouttracker","context":"microservices/workouttracker","dockerfile":"microservices/workouttracker/Dockerfile"}]'
              ;;
            workflow_dispatch:webapp)
              matrix='[{"id":"webapp","image_name":"liftnotebook-webapp","context":"microservices/webapp","dockerfile":"microservices/webapp/Dockerfile"}]'
              ;;
            *)
              echo "Unsupported publish target: ${SELECTED_SERVICE}" >&2
              exit 1
              ;;
          esac

          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  publish-images:
    name: Publish Image (${{ matrix.service.id }})
    needs:
      - go-unit-tests
      - webapp-unit-tests
      - prepare-publish-matrix
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare-publish-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize package namespace
        id: registry
        env:
          RAW_NAMESPACE: ${{ env.GHCR_NAMESPACE }}
        run: |
          echo "namespace=$(printf '%s' "${RAW_NAMESPACE}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ steps.registry.outputs.namespace }}/${{ matrix.service.image_name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.id }}

  update-deployment-references:
    name: Pin Deployment Images
    needs:
      - publish-images
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Normalize package namespace
        id: registry
        env:
          RAW_NAMESPACE: ${{ env.GHCR_NAMESPACE }}
        run: |
          echo "namespace=$(printf '%s' "${RAW_NAMESPACE}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Update Kubernetes image references
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_REGISTRY }}/${{ steps.registry.outputs.namespace }}
        run: |
          short_tag="sha-$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          bash scripts/update-image-references.sh "${short_tag}" "${IMAGE_PREFIX}"

      - name: Commit updated image references
        run: |
          if git diff --quiet -- k8s/environments/linode/apps; then
            echo "No deployment image changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/environments/linode/apps
          git commit -m "chore: pin deployment images to sha-${GITHUB_SHA::12} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

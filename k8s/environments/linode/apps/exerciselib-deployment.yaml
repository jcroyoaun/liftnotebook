apiVersion: apps/v1
kind: Deployment
metadata:
  name: exerciselib
  namespace: exerciselib
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: exerciselib
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app: exerciselib
    spec:
      containers:
        - name: exerciselib
          image: ghcr.io/jcroyoaun/exerciselib:sha-0e509f210a9f
          imagePullPolicy: Always
          args:
            - -env=production
            - -port=4000
            - -limiter-enabled=false
          env:
            # Shared catalog: exerciselib reads/writes the SAME database as
            # workouttracker (liftnotebook-db, cross-namespace FQDN). The
            # credentials are mirrored into this namespace by the deploy
            # script (liftnotebook-db-credentials) — namespaces don't share
            # secrets, same pattern as the jwt-secret mirror.
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: liftnotebook-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: liftnotebook-db-credentials
                  key: password
            - name: EXERCISELIB_DB_DSN
              value: postgres://$(DB_USER):$(DB_PASSWORD)@liftnotebook-db.liftnotebook.svc.cluster.local:5432/liftnotebook?sslmode=disable
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: exerciselib-app-secrets
                  key: admin-api-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: exerciselib-app-secrets
                  key: jwt-secret
                  optional: true
          ports:
            - name: http
              containerPort: 4000
          readinessProbe:
            httpGet:
              path: /v1/healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/healthcheck
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

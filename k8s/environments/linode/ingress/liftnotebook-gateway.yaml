apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: liftnotebook-gateway
  namespace: liftnotebook
spec:
  selector:
    istio: ingress
  servers:
    - hosts:
        # primary domain first (deploy script patches hosts/0 with APP_HOST);
        # the old domain stays as an alias so installed PWAs keep working
        - liftnotebook.app
        - liftnotebook.totalcomp.mx
      port:
        name: http
        number: 80
        protocol: HTTP

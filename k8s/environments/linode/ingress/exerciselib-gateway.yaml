apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: exerciselib-gateway
  namespace: exerciselib
spec:
  selector:
    istio: ingress
  servers:
    - hosts:
        # primary domain first (deploy script patches hosts/0); old domain
        # stays as an alias
        - exerciselib.liftnotebook.app
        - exerciselib.totalcomp.mx
      port:
        name: http
        number: 80
        protocol: HTTP

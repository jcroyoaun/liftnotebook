apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: exerciselib
  namespace: exerciselib
spec:
  hosts:
    - exerciselib.totalcomp.mx
  gateways:
    - exerciselib-gateway
  http:
    - match:
        - uri:
            prefix: /v1/
      route:
        - destination:
            host: exerciselib
            port:
              number: 4000
    - route:
        - destination:
            host: libconsole
            port:
              number: 80
